<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Guys &amp; Dolls — Show Control</title>
  <link rel="stylesheet" href="/public/style.css" />
</head>
<body>

<header>
  <h1>Guys &amp; Dolls</h1>
  <span id="header-time"></span>
</header>

<!-- ── Machine Status ── -->
<section>
  <div class="section-header">Machine Status</div>

  <div class="machine-status" id="status-A">
    <span class="machine-id">A</span>
    <span>Projector A</span>
    <span class="rest-dot rest-unknown" id="rest-A" title="REST service"></span>
    <span class="badge badge-unknown" id="badge-A">VLC offline</span>
    <span class="status-filename" id="file-A"></span>
  </div>

  <div class="machine-status" id="status-B">
    <span class="machine-id">B</span>
    <span>Projector B</span>
    <span class="rest-dot rest-unknown" id="rest-B" title="REST service"></span>
    <span class="badge badge-unknown" id="badge-B">VLC offline</span>
    <span class="status-filename" id="file-B"></span>
  </div>

  <div class="machine-status" id="status-C">
    <span class="machine-id">C</span>
    <span>Screen C</span>
    <span class="rest-dot rest-unknown" id="rest-C" title="REST service"></span>
    <span class="badge badge-unknown" id="badge-C">VLC offline</span>
    <span class="status-filename" id="file-C"></span>
  </div>
</section>

<!-- ── Cue List ── -->
<section>
  <div class="section-header">
    Cue List
  </div>
  <table class="cue-table" id="cue-table">
      <thead>
        <tr>
          <th style="width:2rem">#</th>
          <th>Cue</th>
          <th style="width:2rem"></th>
          <th style="width:4.5rem"></th>
        </tr>
      </thead>
      <tbody id="cue-tbody">
        <tr><td colspan="4" style="padding:16px;color:var(--text-muted);">Loading cues…</td></tr>
      </tbody>
    </table>
</section>

<!-- ── Group A+B Manual Controls ── -->
<section>
  <div class="section-header">Group A+B — Projectors</div>

  <div class="input-row">
    <label>File:</label>
    <input type="text" id="file-ab" placeholder="act1_opening.mp4" />
  </div>

  <div class="btn-row">
    <button class="btn-action" onclick="groupCmd('AB','load')">LOAD</button>
    <button class="btn-action" onclick="groupCmd('AB','play')">PLAY</button>
    <button class="btn-warn"   onclick="groupCmd('AB','pause')">PAUSE</button>
    <button class="btn-stop"   onclick="groupCmd('AB','stop')">STOP</button>
    <label class="loop-toggle"><input type="checkbox" id="loop-ab" /> Loop</label>
  </div>

  <div class="seek-row">
    <label>Seek (s):</label>
    <input type="number" id="seek-ab" value="0" min="0" />
    <button class="btn-neutral btn-sm" onclick="groupSeek('AB')">SEEK</button>
  </div>

  <div class="error-msg" id="err-ab"></div>
</section>

<!-- ── Machine C Manual Controls ── -->
<section>
  <div class="section-header">Machine C — Screen</div>

  <div class="input-row">
    <label>File:</label>
    <input type="text" id="file-c" placeholder="side_intro.mp4" />
  </div>

  <div class="btn-row">
    <button class="btn-action" onclick="groupCmd('C','load')">LOAD</button>
    <button class="btn-action" onclick="groupCmd('C','play')">PLAY</button>
    <button class="btn-warn"   onclick="groupCmd('C','pause')">PAUSE</button>
    <button class="btn-stop"   onclick="groupCmd('C','stop')">STOP</button>
    <label class="loop-toggle"><input type="checkbox" id="loop-c" /> Loop</label>
  </div>

  <div class="seek-row">
    <label>Seek (s):</label>
    <input type="number" id="seek-c" value="0" min="0" />
    <button class="btn-neutral btn-sm" onclick="groupSeek('C')">SEEK</button>
  </div>

  <div class="error-msg" id="err-c"></div>
</section>

<!-- ── Admin ── -->
<section>
  <details>
    <summary>Admin</summary>
    <div class="btn-row" style="border-top:1px solid var(--border);">
      <button class="btn-neutral btn-sm" onclick="launchVlc('A')">Launch VLC on A</button>
      <button class="btn-neutral btn-sm" onclick="launchVlc('B')">Launch VLC on B</button>
      <button class="btn-neutral btn-sm" onclick="launchVlc('C')">Launch VLC on C</button>
    </div>
    <div class="btn-row">
      <button class="btn-neutral btn-sm" onclick="reloadCues()">Reload Cues</button>
    </div>
    <div class="error-msg" id="err-admin"></div>
  </details>
</section>

<script src="/public/app.js"></script>
</body>
</html>
